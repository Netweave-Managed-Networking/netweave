services:
  nginx:
    image: nginx:alpine
    container_name: netweave-proxy
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - netweave-api
      - netweave-web
    restart: unless-stopped

  netweave-api:
    image: ghcr.io/netweave-managed-networking/netweave-api:latest
    container_name: netweave-api
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      netweave-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/api', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  netweave-web:
    image: ghcr.io/netweave-managed-networking/netweave-web:latest
    container_name: netweave-web
    env_file:
      - .env
    environment:
      - SSR_API_URL=http://netweave-api:3000
    depends_on:
      netweave-api:
        condition: service_healthy
    restart: unless-stopped

  netweave-db:
    image: postgres:16-alpine
    container_name: netweave-db
    ports:
      - '5432:5432'
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
