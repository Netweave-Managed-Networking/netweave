services:
  netweave-api:
    build:
      context: .
      dockerfile: apps/netweave-api/Dockerfile
    container_name: netweave-api
    ports:
      - '${PORT}:${PORT}'
    env_file:
      - .env
    volumes:
      - api-logs:${LOG_DIR}
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:${PORT}/api', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  api-logs:
