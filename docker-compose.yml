version: '3.8'

services:
  netweave-api:
    build:
      context: .
      dockerfile: apps/netweave-api/Dockerfile
    container_name: netweave-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_DIR: /app/logs
      API_URL: https://dummyjson.com/quotes/random
      CRON_SCHEDULE: "*/1 * * * *"
    env_file:
      - .env
    volumes:
      - api-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  api-logs:
    driver: local
