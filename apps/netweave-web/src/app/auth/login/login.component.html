<div class="login">
  <app-auth-form
    class="login__auth-form"
    [errorMessage]="error()"
    [loading]="loading() === 'loading'"
    (submitted)="onSubmit($event)"
  >
    <p ngProjectAs="top-label">Anmelden</p>
    <p ngProjectAs="bottom-text">
      Noch keinen Account angelegt?
      <a routerLink="/register" class="link">Account anlegen</a>
    </p>
    <p ngProjectAs="button-text">
      {{ loading() === 'loading' ? 'Bitte warten…' : 'Anmelden' }}
    </p>
  </app-auth-form>
</div>
