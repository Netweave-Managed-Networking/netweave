<div class="auth-form">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <fieldset
      class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4"
    >
      <legend class="fieldset-legend">
        <ng-content select="top-label"></ng-content>
      </legend>

      <div class="field">
        <label class="label" for="email">Email</label>
        <input
          class="input"
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="error">Valid email required</span>
        }
      </div>

      <div class="field">
        <label class="label" for="password">Passwort</label>
        <input
          class="input"
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="error">Min. 8 characters</span>
        }
      </div>

      @if (errorMessage()) {
        <div class="error-banner">{{ errorMessage() }}</div>
      }

      <div class="mt-4">
        <ng-content select="bottom-text"></ng-content>
      </div>
      <div class="mt-1">
        <button class="btn btn-neutral" type="submit" [disabled]="loading()">
          <ng-content select="button-text"></ng-content>
        </button>
      </div>
    </fieldset>
  </form>
</div>
