<div class="login-button">
  @let authenticated_ = authenticated();

  @if (authenticated_ !== 'unauthenticated') {
    @let user = authenticated_;

    <button
      class="login-button__avatar avatar avatar-placeholder cursor-pointer"
      popovertarget="user-menu"
      style="anchor-name: --user-menu-anchor"
    >
      <div class="bg-neutral text-neutral-content w-8 rounded-full">
        <span>{{ user.email.slice(0, 2) }}</span>
      </div>
    </button>
    <div
      class="login-button__user-menu dropdown dropdown-end menu rounded-box mt-1 bg-base-100 shadow-sm max-w-xl"
      popover
      id="user-menu"
      style="position-anchor: --user-menu-anchor"
    >
      <div class="card-body">
        <p class="text-m">Email</p>
        <h2 class="font-bold text-3xl break-words">
          {{ user.email }}
        </h2>

        <p class="text-m">Role</p>
        <h2 class="font-bold text-3xl break-words">
          {{ user.role }}
        </h2>

        <button
          class="login-button__logout mt-1 btn btn-block btn-soft"
          (click)="logout()"
        >
          Abmelden
        </button>
      </div>
    </div>
  }
</div>
