name: Test Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test netweave-api
        run: npm exec nx test netweave-api

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test netweave-web
        run: npm exec nx test netweave-web

  test-api-e2e:
    name: Test API E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test netweave-api-e2e
        run: npm exec nx run netweave-api-e2e:e2e

  test-web-e2e:
    name: Test Web E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test netweave-web-e2e
        run: npm exec nx run netweave-web-e2e:e2e

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-api, test-web, test-api-e2e, test-web-e2e]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-api.result }}" == "failure" ] || \
             [ "${{ needs.test-web.result }}" == "failure" ] || \
             [ "${{ needs.test-api-e2e.result }}" == "failure" ] || \
             [ "${{ needs.test-web-e2e.result }}" == "failure" ]; then
            echo "❌ One or more test jobs failed"
            exit 1
          else
            echo "✅ All tests passed"
          fi
